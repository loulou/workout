<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Workout · Nicolas</title>
<style>
/* Force portrait */
@media screen and (orientation:landscape){
  body::before{content:'';position:fixed;inset:0;background:var(--dark);z-index:9999;display:flex;align-items:center;justify-content:center}
  body::after{content:'Tourne ton téléphone en portrait 📱';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#f0ebe3;font-size:16px;font-family:sans-serif;z-index:10000;text-align:center;width:80%;line-height:1.6}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f4f1ec;--card:#fff;--card2:#f9f7f3;
  --dark:#1c1812;--dark2:#2a2218;
  --t1:#1c1812;--t2:#9a9088;--t3:#c5bdb3;
  --brd:#e4dfd8;--brd2:#ede9e3;
  --accent:#a8956e;
  --g:#2d7a4f;--gbg:#f0faf4;--gbrd:#b8ddc8;
  --o:#b85c00;--obg:#fff7f0;--obrd:#f0c89a;
  --r:#c0392b;--rbg:#fdf2f0;--rbrd:#f0b0a8;
  --rad:12px;--radsm:7px;
}
html,body{background:var(--dark);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;color:var(--t1);font-size:14px;height:100%;overflow:hidden}
.app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}

/* HEADER */
.hdr{background:var(--dark);padding:20px 20px 16px;padding-top:calc(env(safe-area-inset-top,0px) + 20px);flex-shrink:0}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.hdr-name{font-family:'Georgia',serif;font-size:30px;color:#f0ebe3;letter-spacing:0.3px;line-height:1}
.hdr-pill{border:1px solid #3a3028;color:#7a6e62;font-size:10px;font-weight:600;letter-spacing:1.5px;padding:4px 10px;border-radius:3px}
.hdr-pill.done{border-color:#2d7a4f88;color:#4daa72}
.hdr-pill.upcoming{border-color:#3a3028;color:#4a4038}
.hdr-sub{font-size:12px;color:#5a5048;margin-bottom:14px}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-track{flex:1;height:1px;background:#2e2820}
.prog-fill{height:100%;background:#7a6e62;transition:width .4s}
.prog-lbl{font-size:11px;color:#5a5048;white-space:nowrap}

/* TABS */
.tabs{background:var(--dark2);display:flex;border-bottom:1px solid #251f1a;flex-shrink:0}
.tab{flex:1;padding:11px 2px;font-size:10px;font-weight:600;letter-spacing:1.2px;color:#3e3630;border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{color:#c8b89a;border-bottom-color:#c8b89a}
.tab.done-tab{color:#2d7a4f44}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 16px 100px}

/* WARMUP */
.warmup{background:var(--dark);border-radius:var(--rad);padding:13px 15px;margin-bottom:14px}
.wu-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;color:#7a6e62;margin-bottom:5px}
.wu-txt{font-size:12px;color:#5a5048;line-height:1.8}

/* EX CARD */
.ex{background:var(--card);border-radius:var(--rad);border:1px solid var(--brd);margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.ex.locked{border-color:var(--gbrd);background:var(--gbg)}

.ex-hd{padding:14px 14px 0}
.ex-hd-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ex-title{font-size:12px;font-weight:600;letter-spacing:1.3px;color:var(--t1);line-height:1.3}
.ex.locked .ex-title{color:var(--g)}
.ex-meta{font-size:11px;color:var(--t2);margin-top:5px;line-height:1.7}
.ex-meta b{color:var(--accent);font-weight:500}
.btn-info{background:none;border:1px solid var(--brd2);border-radius:50%;width:28px;height:28px;min-width:28px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t3);cursor:pointer;font-family:inherit;transition:all .15s}
.btn-info:active{border-color:var(--accent);color:var(--accent)}

/* INFO DRAWER */
.info-drawer{max-height:0;overflow:hidden;transition:max-height .3s ease}
.info-drawer.open{max-height:300px}
.info-inner{padding:12px 14px;background:var(--card2);border-top:1px solid var(--brd2);margin-top:12px}
.info-lbl{font-size:10px;font-weight:600;letter-spacing:1.2px;color:var(--accent);margin-bottom:7px}
.info-kv{display:flex;gap:4px;font-size:12px;margin-bottom:5px}
.info-k{color:var(--t2)}
.info-v{color:var(--t1);font-weight:500}
.info-sep{height:1px;background:var(--brd2);margin:9px 0}
.info-consigne{font-size:12px;color:var(--t2);line-height:1.7;font-style:italic}

/* TABLE */
.tbl{width:100%;margin-top:12px;border-collapse:collapse}
.tbl thead th{font-size:10px;font-weight:600;letter-spacing:0.8px;color:var(--t3);padding:0 14px 7px;border-bottom:1px solid var(--brd2);text-align:left}
.tbl thead th.c{text-align:center}
.tbl tbody tr{border-bottom:1px solid var(--brd2)}
.tbl tbody tr:last-child{border-bottom:none}
.tbl tbody tr.meg-row{background:var(--card2)}
.tbl tbody td{padding:9px 14px;vertical-align:middle}
.td-lbl{font-size:11px;color:var(--t3);font-weight:500;width:32px}
.td-lbl.meg{color:var(--accent);font-size:10px;letter-spacing:.5px}
.td-charge{font-size:13px;font-weight:600;color:var(--t1)}
.td-charge.meg{font-size:12px;color:var(--t2);font-weight:400}
.td-reps{font-size:13px;color:var(--t1);text-align:center}
.td-reps.meg{font-size:12px;color:var(--t2);text-align:center}
.td-rpe{text-align:center}
.rpe-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.rpe-cible{font-size:10px;color:var(--t3)}
.rpe-inp{width:46px;height:34px;border-radius:var(--radsm);border:1px solid var(--brd);background:var(--card2);color:var(--t3);font-size:14px;font-family:inherit;text-align:center;outline:none;transition:all .15s;appearance:textfield;-moz-appearance:textfield}
.rpe-inp::-webkit-inner-spin-button,.rpe-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.rpe-inp:focus{border-color:var(--accent);color:var(--t1)}
.rpe-inp.ok{border-color:var(--gbrd);background:var(--gbg);color:var(--g);font-weight:500}
.rpe-inp.warn{border-color:var(--obrd);background:var(--obg);color:var(--o);font-weight:500}
.rpe-inp.bad{border-color:var(--rbrd);background:var(--rbg);color:var(--r);font-weight:500}
.meg-dash{color:var(--t3);font-size:12px;text-align:center}

/* EX FOOTER */
.ex-ft{padding:10px 14px 13px;background:var(--card2);border-top:1px solid var(--brd2);display:flex;justify-content:space-between;align-items:center;gap:10px}
.vol-now{font-family:'Georgia',serif;font-size:18px;color:var(--t1);line-height:1}
.vol-sub{font-size:11px;color:var(--t3);margin-top:2px}
.vol-delta{font-weight:600}
.vol-delta.up{color:var(--g)}
.vol-delta.down{color:var(--r)}
.ft-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn-comment{background:none;border:1px solid var(--brd);border-radius:50%;width:32px;height:32px;min-width:32px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t3);cursor:pointer;position:relative;transition:all .15s;font-family:inherit}
.btn-comment:active{border-color:var(--accent);color:var(--accent)}
.btn-comment.has-note{border-color:var(--accent);color:var(--accent);background:var(--obg)}
.note-dot{position:absolute;top:-2px;right:-2px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid var(--card2)}
.btn-valider{background:var(--dark);color:#f0ebe3;border:none;border-radius:var(--radsm);padding:9px 16px;font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-valider:active{opacity:.8}
.btn-valider.done{background:var(--gbg);color:var(--g);border:1px solid var(--gbrd)}

/* TOTAL */
.total{background:var(--dark);border-radius:var(--rad);padding:16px 18px;margin-bottom:12px}
.total-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;color:#6b6055;margin-bottom:10px}
.total-row{display:flex;justify-content:space-between;align-items:baseline}
.total-now{font-family:'Georgia',serif;font-size:26px;color:#f0ebe3}
.total-right{text-align:right}
.total-delta{font-size:13px;font-weight:600;color:#4daa72}
.total-prev{font-size:11px;color:#4a4038;margin-top:2px}

/* UPCOMING SCREEN */
.upcoming-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.upcoming-icon{font-size:40px;margin-bottom:16px}
.upcoming-title{font-family:'Georgia',serif;font-size:22px;color:var(--t1);margin-bottom:8px}
.upcoming-sub{font-size:13px;color:var(--t2);line-height:1.7}

/* BOTTOM */
.btm{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--brd);padding:12px 16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 12px);display:flex;gap:8px;flex-shrink:0}
.btn-save{flex:1;padding:13px;border-radius:var(--rad);border:1px solid var(--brd);background:none;color:var(--t2);font-size:11px;font-weight:600;letter-spacing:.8px;cursor:pointer;font-family:inherit}
.btn-done{flex:2;padding:13px;border-radius:var(--rad);border:none;background:var(--dark);color:#f0ebe3;font-size:11px;font-weight:600;letter-spacing:.8px;cursor:pointer;font-family:inherit}
.btn-done:active{opacity:.8}
.btn-done.sync{background:var(--accent);color:var(--dark)}
.btn-done.synced{background:var(--g);color:#fff}

/* MODAL */
.modal-bd{position:fixed;inset:0;background:rgba(28,24,18,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bd.open{opacity:1;pointer-events:all}
.modal-box{background:var(--card);border-radius:16px 16px 0 0;padding:20px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px);width:100%;max-width:430px;transform:translateY(20px);transition:transform .22s}
.modal-bd.open .modal-box{transform:translateY(0)}
.modal-lbl{font-size:10px;font-weight:600;letter-spacing:1.3px;color:var(--t3);margin-bottom:3px}
.modal-exname{font-size:12px;font-weight:600;letter-spacing:1px;color:var(--t1);margin-bottom:12px}
.modal-ta{width:100%;min-height:90px;border:1px solid var(--brd);border-radius:var(--radsm);padding:12px;font-size:15px;font-family:inherit;color:var(--t1);background:var(--card2);outline:none;resize:none;line-height:1.6}
.modal-ta:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-cancel{flex:1;padding:13px;border-radius:var(--radsm);border:1px solid var(--brd);background:none;color:var(--t2);font-size:14px;cursor:pointer;font-family:inherit}
.modal-save{flex:2;padding:13px;border-radius:var(--radsm);border:none;background:var(--dark);color:#f0ebe3;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}

/* TOAST */
#_toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--dark);color:#f0ebe3;font-size:12px;font-weight:500;padding:10px 22px;border-radius:20px;opacity:0;transition:all .25s;z-index:200;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-name" id="h-name">JAMBES</div>
      <div class="hdr-pill" id="h-pill">S18 · EN COURS</div>
    </div>
    <div class="hdr-sub" id="h-sub">5 exercices</div>
    <div class="prog-row">
      <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <div class="prog-lbl" id="prog-lbl">0 / 5</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab done-tab" onclick="sw('bras')">BRAS</button>
    <button class="tab done-tab" onclick="sw('jambes')">JAMBES</button>
    <button class="tab active" onclick="sw('dos')">DOS</button>
    <button class="tab" onclick="sw('epaules')">ÉPAULES</button>
  </div>

  <div class="scroll" id="scroll"></div>

  <div class="btm">
    <button class="btn-save" onclick="saveDraft()">SAUVEGARDER</button>
    <button class="btn-done" id="btn-main" onclick="mainAction()">TERMINER SÉANCE</button>
  </div>
</div>

<div class="modal-bd" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-lbl">COMMENTAIRE</div>
    <div class="modal-exname" id="m-exname"></div>
    <textarea class="modal-ta" id="m-ta" placeholder="Tes notes sur cet exercice..."></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-save" onclick="saveComment()">Enregistrer</button>
    </div>
  </div>
</div>
<div id="_toast"></div>

<script>

// S18 : BRAS ✅ JAMBES ✅ | DOS en cours | ÉPAULES en cours

const DB = {

    exos:[

       meg:[],

      {id:'crunch', title:'CRUNCH POULIE HAUTE',
       meta:'3 séries · Tempo 3011 · Repos 1\'30',
       gamme:'↑ 12@20,3',
       meg:[{l:'MG1',kg:'20,3',reps:12}],
       regl:{'Poulie':'@18'},
       consigne:'Bassin rétroversé, dos arrondi, regard vers nombril, fessiers serrés. Enrouler vertèbre par vertèbre, pause 1s. Contrôle excentrique, pas d\'élan. Amplitude complète.',
       series:[{l:'S1',kg:'27',reps:15,rpe:7},{l:'S2',kg:'27',reps:15,rpe:8},{l:'S3',kg:'27',reps:15,rpe:9}]},

      {id:'relevés', title:'RELEVÉS DE JAMBES AU SOL',
       meta:'3 séries · Tempo 2011 · Repos 1\'30',
       gamme:'↑ NC',
       meg:[],
       regl:{'Matériel':'Au sol + support fixe'},
       consigne:'Bassin en rétroversion, jambes semi-tendues, fessiers serrés. Monter sans balancer, contrôle descente. Pas d\'élan, gainage constant. Stop si compensation lombaire.',
       series:[{l:'S1',kg:'0',reps:10,rpe:8},{l:'S2',kg:'0',reps:10,rpe:9},{l:'S3',kg:'0',reps:10,rpe:9.5}]}
    ]
  }
};

// ─── VOLUMES SÉANCES PRÉCÉDENTES ──────────────────────────────────────────────
const PREV = {
  tirage_vert:{total:1664}, tirage_uni:{total:788},
  tirage_horiz:{total:1299}, tirage_uni_h:{total:1380},
  kennelly:{total:270}, jm_press:{total:270},
  elev_bilat:{total:414}, elev_uni:{total:306},
  shoulder_press:{total:993}, oiseau:{total:2058},
  crunch:{total:1215}, relevés:{total:0}
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let cur = 'dos';
let rpe={}, locked={}, comments={}, infoOpen={}, synced=false;
let modalId=null;

const k=(id,si)=>id+'_'+si;

function loadState(){
  try{
    const s=localStorage.getItem('wk_v4');
    if(s){const p=JSON.parse(s);rpe=p.rpe||{};locked=p.locked||{};comments=p.comments||{};cur=p.cur||'dos';}
  }catch(e){}
}

function saveState(){
  try{localStorage.setItem('wk_v4',JSON.stringify({cur,rpe,locked,comments,ts:Date.now()}));}catch(e){}
}

// ─── VOLUME ──────────────────────────────────────────────────────────────────
// Volume série de travail : utilise les reps cibles (pas de champ reps séparé)
function volSeries(id, series){
  return Math.round(series.reduce((a,s,si)=>{
    const kg=parseFloat(s.kg.replace(',','.'))||0;
    const hasRpe=!!(rpe[k(id,si)+'_rpe']);
    return a + (hasRpe ? kg*s.reps : 0);
  },0));
}

// Volume MeG fixe (toujours complet)
function volMeg(meg){
  return Math.round((meg||[]).reduce((a,m)=>{
    return a+(parseFloat(m.kg.replace(',','.'))||0)*m.reps;
  },0));
}

// Volume total exercice = MeG + séries validées
function volTotal(id, series, meg){
  return volMeg(meg) + volSeries(id,series);
}

function totalNow(){
  const d=DB[cur];
  if(!d.exos) return 0;
  return d.exos.reduce((a,e)=>a+volTotal(e.id,e.series,e.meg||[]),0);
}

function totalPrev(){
  const d=DB[cur];
  if(!d.exos) return 0;
  return d.exos.reduce((a,e)=>a+(PREV[e.id]?PREV[e.id].total:0),0);
}

// ─── RPE CLASS ───────────────────────────────────────────────────────────────
function rpeClass(val,cible){
  const v=parseFloat(val),c=parseFloat(cible);
  if(isNaN(v)||!val) return '';
  if(v<=c) return 'ok';
  if(v<=c+0.5) return 'warn';
  return 'bad';
}

// ─── SWITCH SESSION ──────────────────────────────────────────────────────────
function sw(s){
  cur=s;
  updateTabs();
  const d=DB[s];
  document.getElementById('h-name').textContent=d.name;

  if(d.done){
    document.getElementById('h-pill').textContent=d.nextCode+' · À VENIR';
    document.getElementById('h-pill').className='hdr-pill upcoming';
    document.getElementById('h-sub').textContent='Séance '+d.code+' terminée';
  } else {
    document.getElementById('h-pill').textContent=d.code+' · EN COURS';
    document.getElementById('h-pill').className='hdr-pill';
    document.getElementById('h-sub').textContent=(d.exos?d.exos.length:0)+' exercices';
  }

  synced=false;
  const btn=document.getElementById('btn-main');
  btn.textContent='TERMINER SÉANCE';
  btn.className='btn-done';
  render();
}

function updateTabs(){
  const keys=['bras','jambes','dos','epaules'];
  const labels=['BRAS','JAMBES','DOS','ÉPAULES'];
  document.querySelectorAll('.tab').forEach((b,i)=>{
    const s=keys[i];
    b.classList.toggle('active',s===cur);
    b.classList.toggle('done-tab',DB[s].done&&s!==cur);
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const d=DB[cur];

  // Session terminée
  if(d.done){
    document.getElementById('prog').style.width='100%';
    document.getElementById('prog-lbl').textContent='✓ terminé';
    document.getElementById('scroll').innerHTML=`
      <div class="upcoming-screen">
        <div class="upcoming-icon">✓</div>
        <div class="upcoming-title">Séance ${d.code} terminée</div>
        <div class="upcoming-sub">La prochaine séance ${d.nextCode}<br>sera préparée après analyse<br>de tes performances.</div>
      </div>`;
    return;
  }

  if(!d.exos||!d.exos.length){
    document.getElementById('scroll').innerHTML='<div style="padding:40px 16px;text-align:center;color:var(--t2);font-size:13px">Programme en préparation.</div>';
    return;
  }

  const doneCnt=d.exos.filter(e=>locked[cur+'_'+e.id]).length;
  const tot=d.exos.length;
  document.getElementById('prog').style.width=(Math.round(doneCnt/tot*100))+'%';
  document.getElementById('prog-lbl').textContent=doneCnt+' / '+tot;

  const tNow=totalNow(), tPrev=totalPrev(), tDelta=tNow-tPrev;

  let h=`<div class="warmup"><div class="wu-lbl">ÉCHAUFFEMENT</div><div class="wu-txt">${d.warmup}</div></div>`;

  d.exos.forEach(ex=>{
    const lid=cur+'_'+ex.id;
    const isLocked=!!locked[lid];
    const hasNote=!!(comments[lid]||'').trim();
    const meg=ex.meg||[];
    const vMeg=volMeg(meg);
    const vSeries=volSeries(ex.id,ex.series);
    const vNow=vMeg+vSeries;
    const vPrev=PREV[ex.id]?PREV[ex.id].total:0;
    const vDelta=vNow-vPrev;
    const dis=isLocked?'disabled':'';

    // MeG rows
    const megRows=meg.map(m=>`<tr class="meg-row">
      <td class="td-lbl meg">${m.l}</td>
      <td class="td-charge meg">${m.kg} kg</td>
      <td class="td-reps meg">${m.reps}</td>
      <td class="meg-dash">—</td>
    </tr>`).join('');

    // Serie rows
    const serieRows=ex.series.map((s,si)=>{
      const rpeVal=rpe[k(ex.id,si)+'_rpe']||'';
      const cls=rpeClass(rpeVal,s.rpe);
      return `<tr>
        <td class="td-lbl">${s.l}</td>
        <td class="td-charge">${s.kg} kg</td>
        <td class="td-reps">${s.reps}</td>
        <td class="td-rpe">
          <div class="rpe-wrap">
            <span class="rpe-cible">${s.rpe}</span>
            <input class="rpe-inp${cls?' '+cls:''}" type="number" min="5" max="10" step="0.5"
              value="${rpeVal}" placeholder="—" ${dis}
              oninput="setRpe('${ex.id}',${si},this.value,${s.rpe})"
              onchange="setRpe('${ex.id}',${si},this.value,${s.rpe})"/>
          </div>
        </td>
      </tr>`;
    }).join('');

    const volLine=`<div class="vol-now" id="vn-${ex.id}">${vNow>0?vNow+' kg':'—'}</div>
      <div class="vol-sub" id="vs-${ex.id}">${vPrev>0?'vs '+vPrev+' kg'+(vNow>0?'&nbsp;<span class="vol-delta '+(vDelta>=0?'up':'down')+'" id="vd-'+ex.id+'">'+(vDelta>=0?'+':'')+vDelta+'</span>':''):'volume exercice'}</div>`;

    h+=`<div class="ex${isLocked?' locked':''}" id="ex-${ex.id}">
      <div class="ex-hd">
        <div class="ex-hd-row">
          <div style="flex:1;min-width:0">
            <div class="ex-title">${ex.title}</div>
            <div class="ex-meta">${ex.meta}<br><b>${ex.gamme}</b></div>
          </div>
          <button class="btn-info" onclick="toggleInfo('${ex.id}')">i</button>
        </div>
      </div>
      <div class="info-drawer${infoOpen[ex.id]?' open':''}" id="info-${ex.id}">
        <div class="info-inner">
          <div class="info-lbl">RÉGLAGES MACHINE</div>
          ${Object.entries(ex.regl).map(([kk,v])=>`<div class="info-kv"><span class="info-k">${kk}</span><span style="color:var(--t3);padding:0 3px">·</span><span class="info-v">${v}</span></div>`).join('')}
          <div class="info-sep"></div>
          <div class="info-consigne">${ex.consigne}</div>
        </div>
      </div>
      <table class="tbl">
        <thead><tr>
          <th></th><th>CHARGE</th><th class="c">REPS</th><th class="c">RPE</th>
        </tr></thead>
        <tbody>
          ${megRows}
          ${serieRows}
        </tbody>
      </table>
      <div class="ex-ft">
        <div>${volLine}</div>
        <div class="ft-actions">
          <button class="btn-comment${hasNote?' has-note':''}" onclick="openModal('${ex.id}')" title="Note">
            ✎${hasNote?'<div class="note-dot"></div>':''}
          </button>
          <button class="btn-valider${isLocked?' done':''}" onclick="toggleLock('${ex.id}')">
            ${isLocked?'✓ VALIDÉ':'VALIDER'}
          </button>
        </div>
      </div>
    </div>`;
  });

  h+=`<div class="total">
    <div class="total-lbl">VOLUME TOTAL SÉANCE</div>
    <div class="total-row">
      <div class="total-now" id="t-now">${tNow>0?tNow+' kg':'—'}</div>
      <div class="total-right">
        ${tNow>0&&tPrev>0
          ?`<div class="total-delta">${tDelta>=0?'+':''}${tDelta} kg</div><div class="total-prev">vs ${tPrev} kg séance préc.</div>`
          :`<div class="total-prev">${tPrev>0?tPrev+' kg séance préc.':''}</div>`}
      </div>
    </div>
  </div>`;

  document.getElementById('scroll').innerHTML=h;
}

// ─── SET RPE (mise à jour légère sans re-render) ──────────────────────────────
function setRpe(id,si,val,cible){
  rpe[k(id,si)+'_rpe']=val;
  const inp=document.querySelector(`#ex-${id} tbody tr:nth-last-child(${DB[cur].exos.find(e=>e.id===id).series.length-si}) .rpe-inp`);
  // Easier: find by data
  document.querySelectorAll(`#ex-${id} .rpe-inp`).forEach((el,i)=>{
    if(i===si){ el.className='rpe-inp'+(val?' '+rpeClass(val,cible):''); }
  });
  refreshVol(id);
  saveState();
}

function refreshVol(id){
  const ex=DB[cur].exos.find(e=>e.id===id);
  if(!ex) return;
  const meg=ex.meg||[];
  const vNow=volMeg(meg)+volSeries(id,ex.series);
  const vPrev=PREV[id]?PREV[id].total:0;
  const vDelta=vNow-vPrev;
  const elN=document.getElementById('vn-'+id);
  if(elN) elN.textContent=vNow>0?vNow+' kg':'—';
  let elD=document.getElementById('vd-'+id);
  if(vNow>0&&vPrev>0){
    if(!elD){
      const vs=document.getElementById('vs-'+id);
      if(vs){elD=document.createElement('span');elD.id='vd-'+id;vs.appendChild(elD);}
    }
    if(elD){elD.className='vol-delta '+(vDelta>=0?'up':'down');elD.textContent=' '+(vDelta>=0?'+':'')+vDelta;}
  }
  const tN=totalNow(),tP=totalPrev(),tD=tN-tP;
  const elT=document.getElementById('t-now');
  if(elT) elT.textContent=tN>0?tN+' kg':'—';
}

// ─── INFO / LOCK / COMMENT ───────────────────────────────────────────────────
function toggleInfo(id){
  infoOpen[id]=!infoOpen[id];
  const p=document.getElementById('info-'+id);
  if(p) p.classList.toggle('open',infoOpen[id]);
}

function toggleLock(id){
  const lid=cur+'_'+id;
  locked[lid]=!locked[lid];
  saveState();
  render();
}

function openModal(id){
  modalId=id;
  const ex=DB[cur].exos?DB[cur].exos.find(e=>e.id===id):null;
  document.getElementById('m-exname').textContent=ex?ex.title:'';
  document.getElementById('m-ta').value=comments[cur+'_'+id]||'';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('m-ta').focus(),300);
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}
function saveComment(){
  if(modalId){comments[cur+'_'+modalId]=(document.getElementById('m-ta').value||'').trim();saveState();}
  document.getElementById('modal').classList.remove('open');
  render();
}

// ─── SAVE / SYNC ─────────────────────────────────────────────────────────────
const SYNC_URL='https://script.google.com/macros/s/AKfycbwZcAy3QU_02S6tw3Tfm9r3Nam-wXQf7lddFEspK6pBt0VRGbiNgaXWzvjZnVO4lahy/exec';

function saveDraft(){ saveState(); toast('Brouillon sauvegardé'); }

function mainAction(){
  const d=DB[cur];
  if(d.done){toast('Cette séance est déjà terminée');return;}
  if(!d.exos||!d.exos.every(e=>locked[cur+'_'+e.id])){
    toast("Valide tous les exercices d'abord");return;
  }
  if(!synced){
    synced=true;
    document.getElementById('btn-main').textContent='↑ SYNCHRONISER';
    document.getElementById('btn-main').classList.add('sync');
    document.getElementById('h-pill').textContent=d.code+' · TERMINÉE';
    document.getElementById('h-pill').classList.add('done');
    toast('Séance terminée ! Appuie sur Synchroniser.');
    return;
  }
  const btn=document.getElementById('btn-main');
  btn.textContent='ENVOI...';
  btn.disabled=true;
  const today=new Date().toLocaleDateString('fr-FR');
  const payload={
    date:today, session:d.name, code:d.code,
    exercices:d.exos.map(ex=>({
      titre:ex.title,
      commentaire:comments[cur+'_'+ex.id]||'',
      volume_total:volTotal(ex.id,ex.series,ex.meg||[]),
      series:ex.series.map((s,si)=>({
        label:s.l, charge:s.kg, reps:s.reps,
        rpe_cible:s.rpe, rpe_reel:rpe[k(ex.id,si)+'_rpe']||''
      }))
    }))
  };
  fetch(SYNC_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(()=>{
    btn.textContent='✓ SYNCHRONISÉ';
    btn.className='btn-done synced';
    btn.disabled=false;
    toast('Données envoyées dans Google Sheet !');
    saveState();
  })
  .catch(()=>{
    btn.textContent='↑ RÉESSAYER';
    btn.className='btn-done sync';
    btn.disabled=false;
    toast('Erreur réseau — réessaie');
  });
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let _tt;
function toast(msg){
  const t=document.getElementById('_toast');
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(_tt);_tt=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(8px)';},2500);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadState();
sw(cur);
</script>
